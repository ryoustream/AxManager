name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare signing keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "Using configured release keystore secret"
            echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
            {
              echo "signing.storeFile=$GITHUB_WORKSPACE/release.jks"
              echo "signing.storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}"
              echo "signing.keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}"
              echo "signing.keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}"
            } >> local.properties
          else
            echo "No signing secrets configured yet - generating a temporary self-signed keystore"
            echo "(add SIGNING_KEYSTORE_BASE64 / SIGNING_STORE_PASSWORD / SIGNING_KEY_ALIAS / SIGNING_KEY_PASSWORD"
            echo " repo secrets to sign with your own key instead)"
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/temp-release.jks" \
              -alias ryoustream-ci -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass ci-temp-pass -keypass ci-temp-pass \
              -dname "CN=AxManager CI, OU=ryoustream, O=ryoustream, L=Unknown, S=Unknown, C=ID"
            {
              echo "signing.storeFile=$GITHUB_WORKSPACE/temp-release.jks"
              echo "signing.storePassword=ci-temp-pass"
              echo "signing.keyAlias=ryoustream-ci"
              echo "signing.keyPassword=ci-temp-pass"
            } >> local.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :manager:assembleRelease --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find manager/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in manager/build/outputs/apk/release" >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxManager-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
